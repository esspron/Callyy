<!DOCTYPE html>
<html lang="en" class="dark">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Voicory - Voice AI Platform</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Noto+Sans+Devanagari:wght@400;500;700&display=swap" rel="stylesheet">
    <script>
      tailwind.config = {
        darkMode: 'class',
        theme: {
          extend: {
            fontFamily: {
              sans: ['Inter', 'Noto Sans Devanagari', 'sans-serif'],
            },
            colors: {
              background: '#121417',
              surface: '#1B1E23',
              surfaceHover: '#252930',
              primary: '#2EC7B7', // Vapi-like teal/cyan
              primaryHover: '#26AFA1',
              border: '#2D3139',
              textMain: '#EBEBEB',
              textMuted: '#9CA3AF',
            }
          }
        }
      }
    </script>
    <style>
      /* Custom scrollbar for dashboard feel */
      ::-webkit-scrollbar {
        width: 8px;
        height: 8px;
      }
      ::-webkit-scrollbar-track {
        background: #121417; 
      }
      ::-webkit-scrollbar-thumb {
        background: #2D3139; 
        border-radius: 4px;
      }
      ::-webkit-scrollbar-thumb:hover {
        background: #4B5563; 
      }
    </style>
