<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Voicory Logo Generator</title>
    <style>
        @font-face {
            font-family: 'Ahsing';
            src: url('assets/fonts/ahsing-font/typogama-ahsing.otf') format('opentype');
        }
        
        body {
            background: #1a1a2e;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            font-family: system-ui, sans-serif;
            color: white;
            gap: 30px;
        }
        
        h1 {
            font-size: 24px;
            color: #888;
        }
        
        .logo-container {
            display: flex;
            flex-direction: column;
            gap: 40px;
            align-items: center;
        }
        
        .logo-variant {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 15px;
        }
        
        .logo-variant label {
            color: #666;
            font-size: 14px;
        }
        
        /* Logo with gradient */
        .logo-gradient {
            font-family: 'Ahsing', cursive;
            font-size: 72px;
            background: linear-gradient(135deg, #4ECDC4 0%, #2CB5A8 50%, #1FA396 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            letter-spacing: 2px;
        }
        
        /* Logo white */
        .logo-white {
            font-family: 'Ahsing', cursive;
            font-size: 72px;
            color: white;
            letter-spacing: 2px;
        }
        
        /* Logo black (for light backgrounds) */
        .logo-black {
            font-family: 'Ahsing', cursive;
            font-size: 72px;
            color: #1a1a2e;
            letter-spacing: 2px;
            background: white;
            padding: 20px 40px;
            border-radius: 12px;
        }
        
        /* Logo teal */
        .logo-teal {
            font-family: 'Ahsing', cursive;
            font-size: 72px;
            color: #4ECDC4;
            letter-spacing: 2px;
        }
        
        .buttons {
            display: flex;
            gap: 15px;
            flex-wrap: wrap;
            justify-content: center;
        }
        
        button {
            background: linear-gradient(135deg, #4ECDC4, #2CB5A8);
            border: none;
            color: black;
            padding: 12px 24px;
            font-size: 14px;
            font-weight: 600;
            border-radius: 8px;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
        }
        
        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(78, 205, 196, 0.3);
        }
        
        .canvas-container {
            position: absolute;
            left: -9999px;
        }
        
        .instructions {
            max-width: 600px;
            text-align: center;
            color: #666;
            font-size: 14px;
            line-height: 1.6;
        }
    </style>
</head>
<body>
    <h1>Voicory Logo Generator</h1>
    
    <div class="logo-container">
        <div class="logo-variant">
            <label>Gradient (Primary)</label>
            <div class="logo-gradient" id="logo-gradient">VOICORY</div>
        </div>
        
        <div class="logo-variant">
            <label>Teal Solid</label>
            <div class="logo-teal" id="logo-teal">VOICORY</div>
        </div>
        
        <div class="logo-variant">
            <label>White (for dark backgrounds)</label>
            <div class="logo-white" id="logo-white">VOICORY</div>
        </div>
        
        <div class="logo-variant">
            <label>Dark (for light backgrounds)</label>
            <div class="logo-black" id="logo-black">VOICORY</div>
        </div>
    </div>
    
    <div class="buttons">
        <button onclick="downloadLogo('gradient', '#1a1a2e')">Download Gradient PNG</button>
        <button onclick="downloadLogo('teal', '#1a1a2e')">Download Teal PNG</button>
        <button onclick="downloadLogo('white', 'transparent')">Download White PNG</button>
        <button onclick="downloadLogo('black', 'transparent')">Download Dark PNG</button>
    </div>
    
    <div class="instructions">
        <p>Click any button above to download the logo as a high-resolution PNG file.<br>
        The logos are generated at 2x resolution for crisp display on retina screens.</p>
    </div>
    
    <div class="canvas-container">
        <canvas id="canvas"></canvas>
    </div>
    
    <script>
        async function downloadLogo(variant, bgColor) {
            const canvas = document.getElementById('canvas');
            const ctx = canvas.getContext('2d');
            
            // Fixed 120x120 output
            const targetSize = 120;
            canvas.width = targetSize;
            canvas.height = targetSize;
            
            // Load font
            await document.fonts.ready;
            
            // Clear and set background
            if (bgColor === 'transparent') {
                ctx.clearRect(0, 0, canvas.width, canvas.height);
            } else {
                ctx.fillStyle = bgColor;
                ctx.fillRect(0, 0, canvas.width, canvas.height);
            }
            
            // Find the right font size to fit
            let fontSize = 60;
            const text = 'VOICORY';
            ctx.font = `${fontSize}px Ahsing`;
            let metrics = ctx.measureText(text);
            
            // Scale font to fit width with padding
            const maxWidth = targetSize - 10;
            if (metrics.width > maxWidth) {
                fontSize = fontSize * (maxWidth / metrics.width);
            }
            
            // Draw text centered
            ctx.font = `${fontSize}px Ahsing`;
            ctx.textBaseline = 'middle';
            ctx.textAlign = 'center';
            
            const x = targetSize / 2;
            const y = targetSize / 2;
            
            if (variant === 'gradient') {
                const gradient = ctx.createLinearGradient(0, 0, targetSize, targetSize);
                gradient.addColorStop(0, '#4ECDC4');
                gradient.addColorStop(0.5, '#2CB5A8');
                gradient.addColorStop(1, '#1FA396');
                ctx.fillStyle = gradient;
            } else if (variant === 'teal') {
                ctx.fillStyle = '#4ECDC4';
            } else if (variant === 'white') {
                ctx.fillStyle = '#FFFFFF';
            } else if (variant === 'black') {
                ctx.fillStyle = '#1a1a2e';
            }
            
            ctx.fillText(text, x, y);
            
            // Download
            const link = document.createElement('a');
            link.download = `voicory-logo-${variant}-120x120.png`;
            link.href = canvas.toDataURL('image/png');
            link.click();
        }
    </script>
</body>
</html>
